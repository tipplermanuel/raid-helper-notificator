services:
  mongo:
    image: mongo:7.0
    container_name: raidnotificator-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - raidnet
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      
   bot:
    build:
      context: .
      dockerfile: RaidNotificator/Dockerfile
    container_name: raidnotificator-bot
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      DCToken: ${DCToken}
      GuildId: ${GuildId}
      ChannelName: ${ChannelName}
      AdminClientId: ${AdminClientId}
      ConnectionString: ${ConnectionString}
      DOTNET_EnableDiagnostics: "0"
    networks:
      - raidnet
volumes:
  mongo_data:
    driver: local

networks:
  raidnet:
    driver: bridge
